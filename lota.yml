vars:
  - FRONTEND_DIR=./frontend
  - WEB_DIST=web/dist
  - BINARY=outless

build:
  desc: Build frontend and Go binary
  script: |
    set -euo pipefail
    (
      cd "$FRONTEND_DIR"
      pnpm install
      pnpm generate
    )
    rm -rf "$WEB_DIST"
    mkdir -p "$WEB_DIST"
    cp -r "$FRONTEND_DIR"/.output/public/. "$WEB_DIST"/
    CGO_ENABLED=0 go build -trimpath -tags "with_reality_server with_utls" -ldflags="-s -w" -o "$BINARY" ./cmd/outless

run:
  desc: Run the application
  depends:
    - build
  parallel: false
  script: |
    ./outless
  color: red

dev:
  desc: Run frontend and backend in dev mode with hot reload
  depends:
    - frontend-dev
    - backend-dev
  parallel: true
  script: |
    echo "Dev mode started. Frontend: http://localhost:41221, API: http://localhost:41220"
    echo "Press Ctrl+C to stop."

frontend-dev:
  desc: Run frontend dev server with hot reload
  script: |
    cd "$FRONTEND_DIR"
    pnpm dev

backend-dev:
  desc: Run Go backend with hot reload via air
  script: |
    air

lint:
  backend:
    desc: Run golangci-lint on the backend
    script: |
      golangci-lint run ./...

  frontend:
    desc: Run eslint and oxlint on the frontend
    script: |
      cd "$FRONTEND_DIR"
      pnpm lint
      pnpm lint:ox
