vars:
  - FRONTEND_DIR=./frontend
  - WEB_DIST=web/dist
  - BINARY=outless
  - GO_TAGS=with_reality_server with_utls
  - GO_LDFLAGS=-s -w
  - SDK_URL=https://downloads.openwrt.org/releases/23.05.4/targets/mediatek/mt7622/openwrt-sdk-23.05.4-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64.tar.xz
  - SDK_DIR=$HOME/openwrt-sdk
  - SDK_ARCH=mediatek-mt7622

build:
  desc: Build for different platforms
  x64:
    desc: Build for x64
    script: |
      set -euo pipefail
      (
        cd "$FRONTEND_DIR"
        pnpm install
        pnpm generate
      )
      rm -rf "$WEB_DIST"
      mkdir -p "$WEB_DIST"
      cp -r "$FRONTEND_DIR"/.output/public/. "$WEB_DIST"/
      CGO_ENABLED=0 go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" -o "$BINARY" ./cmd/outless

  arm64:
    desc: Build for Linux ARM64 (aarch64)
    script: |
      set -euo pipefail
      (
        cd "$FRONTEND_DIR"
        pnpm install
        pnpm generate
      )
      rm -rf "$WEB_DIST"
      mkdir -p "$WEB_DIST"
      cp -r "$FRONTEND_DIR"/.output/public/. "$WEB_DIST"/
      GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" -o "${BINARY}-linux-arm64" ./cmd/outless

  arm:
    desc: Build for Linux ARM (armv7)
    script: |
      set -euo pipefail
      (
        cd "$FRONTEND_DIR"
        pnpm install
        pnpm generate
      )
      rm -rf "$WEB_DIST"
      mkdir -p "$WEB_DIST"
      cp -r "$FRONTEND_DIR"/.output/public/. "$WEB_DIST"/
      GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" -o "${BINARY}-linux-armv7" ./cmd/outless

run:
  desc: Run the application
  depends:
    - build
  parallel: false
  script: |
    ./outless server run
  color: red

dev:
  desc: Run frontend and backend in dev mode with hot reload
  depends:
    - frontend-dev
    - backend-dev
  parallel: true
  script: |
    echo "Dev mode started. Frontend: http://localhost:41221, API: http://localhost:41220"
    echo "Press Ctrl+C to stop."

frontend-dev:
  desc: Run frontend dev server with hot reload
  script: |
    cd "$FRONTEND_DIR"
    pnpm dev

backend-dev:
  desc: Run Go backend with hot reload via air
  script: |
    air

package:
  desc: Build packages for different platforms
  ipk:
    desc: Build OpenWrt .ipk package (auto-downloads SDK if missing)
    depends:
      - build.arm64
    script: |
      set -euo pipefail
      SDK_TARBALL="/tmp/$(basename "$SDK_URL")"
      REAL_SDK_DIR="$SDK_DIR"

      if [ ! -d "$REAL_SDK_DIR/staging_dir" ]; then
        echo "OpenWrt SDK not found at $REAL_SDK_DIR"
        if [ ! -f "$SDK_TARBALL" ]; then
          echo "Downloading SDK... (~200 MB)"
          wget -q --show-progress -O "$SDK_TARBALL" "$SDK_URL" || curl -L -o "$SDK_TARBALL" "$SDK_URL"
        fi
        echo "Extracting SDK..."
        mkdir -p "$REAL_SDK_DIR"
        tar xf "$SDK_TARBALL" -C "$REAL_SDK_DIR" --strip-components=1
        rm -f "$SDK_TARBALL"
        echo "SDK ready at $REAL_SDK_DIR"
      fi

      mkdir -p "$REAL_SDK_DIR/package/outless"
      cp "${BINARY}-linux-arm64" "$REAL_SDK_DIR/package/outless/outless"
      cp -r deploy/openwrt/files "$REAL_SDK_DIR/package/outless/"
      cp deploy/openwrt/Makefile "$REAL_SDK_DIR/package/outless/"

      OUTLESS_ROOT="$PWD"
      echo "Building .ipk..."
      cd "$REAL_SDK_DIR"
      make defconfig
      make package/outless/compile V=s -j$(nproc)

      IPK_PATH=$(find "$REAL_SDK_DIR/bin/packages" -name "outless_*.ipk" | head -n1)
      if [ -z "$IPK_PATH" ]; then
        echo "ERROR: .ipk not found after build"
        exit 1
      fi
      cp "$IPK_PATH" "$OUTLESS_ROOT/"
      cd "$OUTLESS_ROOT"
      echo "IPK built:"
      ls -lh ./outless_*.ipk

lint:
  backend:
    desc: Run golangci-lint on the backend
    script: |
      golangci-lint run ./...

  frontend:
    desc: Run eslint and oxlint on the frontend
    script: |
      cd "$FRONTEND_DIR"
      pnpm lint
      pnpm lint:ox
