name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Patch go.mod for linter compatibility
        run: sed -i 's/^go 1.26.1$/go 1.24/' go.mod
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
      - name: Download Go modules
        run: go mod download
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  binaries:
    runs-on: ubuntu-latest
    needs: lint
    env:
      GO_TAGS: with_reality_server with_utls
      GO_LDFLAGS: -s -w
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install -g pnpm@9.15.0
      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm generate
      - name: Stage web assets
        run: |
          rm -rf web/dist
          mkdir -p web/dist
          cp -r frontend/.output/public/. web/dist/
      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" \
            -o outless-linux-amd64 ./cmd/outless
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" \
            -o outless-linux-arm64 ./cmd/outless
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 \
            go build -trimpath -tags "$GO_TAGS" -ldflags="$GO_LDFLAGS" \
            -o outless-linux-armv7 ./cmd/outless
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: outless-linux-*

  ipk:
    runs-on: ubuntu-latest
    needs: binaries
    env:
      SDK_URL: https://downloads.openwrt.org/releases/23.05.4/targets/mediatek/mt7622/openwrt-sdk-23.05.4-mediatek-mt7622_gcc-12.3.0_musl.Linux-x86_64.tar.xz
      SDK_DIR: ${{ github.workspace }}/openwrt-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
      - name: Cache OpenWrt SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_DIR }}
          key: openwrt-sdk-mt7622-23.05.4
      - name: Download and extract SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          SDK_TARBALL=/tmp/openwrt-sdk.tar.xz
          echo "Downloading SDK..."
          wget -q -O "$SDK_TARBALL" "$SDK_URL" || curl -L -o "$SDK_TARBALL" "$SDK_URL"
          echo "Extracting SDK..."
          mkdir -p "$SDK_DIR"
          tar xf "$SDK_TARBALL" -C "$SDK_DIR" --strip-components=1
          rm -f "$SDK_TARBALL"
      - name: Prepare package
        run: |
          mkdir -p "$SDK_DIR/package/outless"
          cp outless-linux-arm64 "$SDK_DIR/package/outless/outless"
          cp -r deploy/openwrt/files "$SDK_DIR/package/outless/"
          cp deploy/openwrt/Makefile "$SDK_DIR/package/outless/"
      - name: Patch Makefile version and URL
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" "$SDK_DIR/package/outless/Makefile"
          sed -i 's|^URL:=https://github.com/quonaro/outless|URL:=https://github.com/OutVless/Outless|' "$SDK_DIR/package/outless/Makefile"
      - name: Build IPK
        run: |
          cd "$SDK_DIR"
          make defconfig
          make package/outless/compile V=s -j$(nproc)
      - name: Collect IPK
        run: |
          IPK_PATH=$(find "$SDK_DIR/bin/packages" -name "outless_*.ipk" | head -n1)
          if [ -z "$IPK_PATH" ]; then
            echo "ERROR: .ipk not found after build"
            exit 1
          fi
          cp "$IPK_PATH" ./outless.ipk
      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ipk
          path: ./outless.ipk

  release:
    runs-on: ubuntu-latest
    needs: [binaries, ipk]
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries
      - name: Download IPK
        uses: actions/download-artifact@v4
        with:
          name: ipk
          path: ipk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            binaries/outless-linux-amd64
            binaries/outless-linux-arm64
            binaries/outless-linux-armv7
            ipk/*.ipk
